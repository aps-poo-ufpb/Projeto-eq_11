<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Pets | PetShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-heart-fill text-danger me-2"></i>Sistema PetShop
        </a>
    </div>
</nav>

<main class="container mt-4">
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill me-1"></i>
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-list-ul me-2"></i>Pets Cadastrados</h2>
        <a href="/pets/novo" class="btn btn-dark">
            <i class="bi bi-plus-lg me-1"></i>Novo Pet
        </a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Nome</th>
                    <th>Espécie</th>
                    <th>Raça</th>
                    <th>Idade</th>
                    <th>Dono</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(pets)}">
                    <td colspan="7" class="text-center text-muted py-4">
                        Nenhum pet cadastrado ainda.
                    </td>
                </tr>
                <tr th:each="pet : ${pets}">
                    <td th:text="${pet.id}"></td>
                    <td th:text="${pet.nome}"></td>
                    <td th:text="${pet.especie}"></td>
                    <td th:text="${pet.raca}"></td>
                    <td th:text="${pet.idade} + ' anos'"></td>
                    <td th:text="${pet.dono}"></td>
                    <td>
                        <a th:href="@{/pets/{id}/editar(id=${pet.id})}"
                           class="btn btn-sm btn-outline-secondary me-1">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                        <form th:action="@{/pets/{id}/remover(id=${pet.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Remover este pet?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i> Remover
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
